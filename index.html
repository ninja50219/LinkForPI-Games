<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DB Passwort Rotation</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13141a;
      --border:    #1f2130;
      --accent:    #4af0a0;
      --accent2:   #2dd4bf;
      --text:      #e8eaf0;
      --muted:     #4a4e6a;
      --error:     #ff5f6d;
      --font:      'IBM Plex Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      animation: slideUp 0.4s ease;
    }

    /* grüner Glow oben */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%; transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .header { text-align: center; margin-bottom: 32px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #0d2e1e;
      border: 1px solid #1a5c38;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .badge span { font-size: 14px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    /* ── INFO-BOX ── */
    .info-box {
      background: #0d1420;
      border: 1px solid #1a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 24px;
      font-size: 11px;
      color: #5a7fa8;
      line-height: 1.8;
    }

    .info-box .row {
      display: flex;
      justify-content: space-between;
    }

    .info-box .val { color: #7bafd4; font-weight: 600; }

    /* ── FELDER ── */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }

    input {
      width: 100%;
      background: #0b0c10;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent2); }

    .toggle-pw {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
    }

    /* ── BUTTON ── */
    button.submit {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button.submit:hover  { opacity: 0.85; }
    button.submit:active { transform: scale(0.98); }
    button.submit:disabled { background: #1f2130; color: var(--muted); cursor: not-allowed; }

    /* ── STATUS ── */
    .status {
      margin-top: 20px;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      display: none;
      align-items: flex-start;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    .status.ok    { background: #0a1f14; border: 1px solid #1a4d30; color: var(--accent); display: flex; }
    .status.err   { background: #1f0a0c; border: 1px solid #4d1a1e; color: var(--error);  display: flex; }
    .status.loading { background: #0d1420; border: 1px solid #1a2a40; color: #5a7fa8; display: flex; }

    .status-icon { font-size: 18px; flex-shrink: 0; }
    .status-text { line-height: 1.5; }

    /* ── LOG ── */
    .log {
      margin-top: 16px;
      background: #080910;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 11px;
      color: var(--muted);
      line-height: 2;
      display: none;
    }

    .log.visible { display: block; }
    .log .ok  { color: var(--accent); }
    .log .err { color: var(--error); }
    .log .inf { color: #5a7fa8; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── CURSOR BLINK ── */
    .cursor {
      display: inline-block;
      width: 7px; height: 13px;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="badge"><span>🔐</span> DB ROTATION</div>
    <h1>Passwort ändern</h1>
    <p class="subtitle">Einloggen → Passwort wird automatisch geändert</p>
  </div>

  <!-- Feste Infos -->
  <div class="info-box">
    <div class="row"><span>HOST</span><span class="val">192.168.1.100</span></div>
    <div class="row"><span>PORT</span><span class="val">3306</span></div>
    <div class="row"><span>DATENBANK</span><span class="val">meine_datenbank</span></div>
    <div class="row"><span>NEUES PASSWORT</span><span class="val">TestPasswort</span></div>
  </div>

  <!-- Formular -->
  <div class="field">
    <label>Benutzername</label>
    <input type="text" id="user" placeholder="z.B. db_user" autocomplete="off"/>
  </div>

  <div class="field">
    <label>Aktuelles Passwort</label>
    <div class="input-wrap">
      <input type="password" id="pass" placeholder="••••••••" id="pass"/>
      <button class="toggle-pw" onclick="togglePw()" title="Anzeigen">👁</button>
    </div>
  </div>

  <button class="submit" id="btn" onclick="startRotation()">
    🔄 ROTATION STARTEN
  </button>

  <!-- Status -->
  <div class="status" id="status">
    <div class="status-icon" id="status-icon"></div>
    <div class="status-text" id="status-text"></div>
  </div>

  <!-- Log -->
  <div class="log" id="log"></div>

</div>

<script>
  function togglePw() {
    const input = document.getElementById("pass");
    input.type = input.type === "password" ? "text" : "password";
  }

  function addLog(text, type = "inf") {
    const log = document.getElementById("log");
    log.classList.add("visible");
    const time = new Date().toLocaleTimeString();
    log.innerHTML += `<div class="${type}">[${time}] ${text}</div>`;
  }

  function setStatus(type, icon, text) {
    const el = document.getElementById("status");
    el.className = `status ${type}`;
    document.getElementById("status-icon").textContent = icon;
    document.getElementById("status-text").textContent = text;
  }

  async function startRotation() {
    const user = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value;

    if (!user || !pass) {
      setStatus("err", "⚠️", "Bitte User und Passwort eingeben!");
      return;
    }

    // UI sperren
    const btn = document.getElementById("btn");
    btn.disabled = true;
    btn.textContent = "Läuft...";
    document.getElementById("log").innerHTML = "";
    document.getElementById("log").classList.remove("visible");

    setStatus("loading", "⏳", "Verbinde mit Datenbank...");
    addLog(`Verbinde mit 192.168.1.100:3306 ...`);

    try {
      // ── FETCH an Python Backend ──────────────────────
      // Das HTML schickt User + Passwort an server.py
      // server.py verbindet sich mit MariaDB und ändert das Passwort
      const antwort = await fetch("http://localhost:5000/rotate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: user, password: pass })
      });

      const daten = await antwort.json();
      // ─────────────────────────────────────────────────

      if (daten.erfolg) {
        addLog("Verbindung OK ✓", "ok");
        addLog(`User '${user}' authentifiziert ✓`, "ok");
        addLog("ALTER USER ausgeführt ✓", "ok");
        addLog("FLUSH PRIVILEGES ✓", "ok");
        addLog("Verbindung geschlossen.", "inf");
        setStatus("ok", "✅", daten.nachricht);
      } else {
        addLog(`Fehler: ${daten.nachricht}`, "err");
        setStatus("err", "❌", daten.nachricht);
      }

    } catch (e) {
      // Wenn server.py nicht läuft
      addLog("Kann Backend nicht erreichen!", "err");
      setStatus("err", "❌", "Backend nicht erreichbar. Läuft server.py?");
    }

    btn.disabled = false;
    btn.textContent = "🔄 ROTATION STARTEN";
  }

  // Enter-Taste zum Absenden
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") startRotation();
  });
</script>

</body>
</html>
